services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pinenova_test
      POSTGRES_USER: pg
      POSTGRES_PASSWORD: pg
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pg -d pinenova_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
